name: CI
on:
  workflow_dispatch:
    inputs:
      push-docker-image-to-harbor:
        description: "Push Docker Image to Harbor"
        type: boolean
        default: false
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  linting:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: |
          uv sync

      - name: Run black
        run: uv run black --check --line-length 120 inventory_management_system_api test

      - name: Run pylint
        run: uv run pylint inventory_management_system_api test

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create logging configuration file
        run: cp logging.example.ini logging.ini

      - name: Run unit tests
        run: |
          docker build --file Dockerfile --target test --tag inventory-management-system-api:test .
          docker run \
           --name inventory-management-system-api \
           --volume ./logging.ini:/app/logging.ini \
           inventory-management-system-api:test \
           pytest --config-file test/pytest.ini --cov inventory_management_system_api --cov-report xml test/unit -v
          docker cp inventory-management-system-api:/app/coverage.xml coverage.xml

      - name: Upload coverage reports to Codecov
        if: success()
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5.5.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e-tests:
    needs: [unit-tests]
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create logging configuration file
        run: cp logging.example.ini logging.ini

      # Used to use supercharge/mongodb-github-action, but it can't currently use auth and a replica set at
      # the same time
      - name: Setup MongoDB database
        run: |
          docker compose up --detach mongo-db

      - name: Run e2e tests
        run: |
          docker build --file Dockerfile --target test --tag inventory-management-system-api:test .
          docker run \
           --name inventory-management-system-api \
           --network host \
           --volume ./logging.ini:/app/logging.ini \
           inventory-management-system-api:test \
           pytest --config-file test/pytest.ini test/e2e -v

      - name: Output docker logs (mongodb)
        if: failure()
        run: docker logs ims-api-mongodb

  docker:
    # This job triggers only if all the other jobs succeed. It builds the Docker image
    # and if run manually from Github Actions, it pushes to Harbor.
    needs: [linting, unit-tests, e2e-tests]
    name: Docker
    runs-on: ubuntu-latest
    env:
      PUSH_DOCKER_IMAGE_TO_HARBOR: ${{ inputs.push-docker-image-to-harbor != null && inputs.push-docker-image-to-harbor || 'false' }}
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ vars.HARBOR_URL }}/ims-api

      - name: Login to Harbor
        if: ${{ fromJSON(env.PUSH_DOCKER_IMAGE_TO_HARBOR) }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ vars.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_TOKEN }}

      - name: ${{ fromJSON(env.PUSH_DOCKER_IMAGE_TO_HARBOR) && 'Build and push Docker image to Harbor' || 'Build Docker image' }}
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: ${{ fromJSON(env.PUSH_DOCKER_IMAGE_TO_HARBOR) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: prod
